<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PC Monitor Hub</title>

    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #020617;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 360px;
        background: #111827;
        padding: 20px;
        border-radius: 20px;
      }

      .status {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .off { background: red; }
      .on { background: lime; }

      .qr {
        margin: 20px auto;
        width: 180px;
        height: 180px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .qr img {
        width: 100%;
      }

      .ip {
        text-align: center;
        color: yellow;
      }

      .btn {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        cursor: pointer;
      }

      .log {
        margin-top: 20px;
        height: 150px;
        overflow: auto;
        background: black;
        padding: 10px;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h3>PC Monitor</h3>

      <div class="status">
        <div id="dot" class="dot off"></div>
        <span id="status">OFFLINE</span>
      </div>

      <div class="qr">
        <img id="qr" />
      </div>

      <div id="ip" class="ip">Not running</div>

      <button id="btn" class="btn">START</button>

      <div style="margin-top: 10px">
        <label><input type="checkbox" id="startMin" /> Start Minimized</label><br />
        <label><input type="checkbox" id="minTray" /> Minimize To Tray</label><br />
        <label><input type="checkbox" id="closeTray" /> Close To Tray</label><br />
        <label><input type="checkbox" id="autoStart" /> Auto Start</label>
      </div>

      <div id="log" class="log"></div>
    </div>

    <script>
      console.log("API:", window.api); // ✅ debug

      let running = false;

      const btn = document.getElementById("btn");
      const dot = document.getElementById("dot");
      const statusText = document.getElementById("status");
      const qr = document.getElementById("qr");
      const ipText = document.getElementById("ip");
      const logBox = document.getElementById("log");

      const startMin = document.getElementById("startMin");
      const minTray = document.getElementById("minTray");
      const closeTray = document.getElementById("closeTray");
      const autoStart = document.getElementById("autoStart");

      // ================= LOG =================
      function log(msg) {
        const t = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div>[${t}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
      }

      // ================= SETTINGS =================
      window.api.on("settings", (_, s) => {
        startMin.checked = s.startMinimized;
        minTray.checked = s.minimizeToTray;
        closeTray.checked = s.closeToTray;
        autoStart.checked = s.autoStart;
      });

      [startMin, minTray, closeTray, autoStart].forEach((el) => {
        el.onchange = () => {
          window.api.send("update-settings", {
            startMinimized: startMin.checked,
            minimizeToTray: minTray.checked,
            closeToTray: closeTray.checked,
            autoStart: autoStart.checked,
          });
        };
      });

      // ================= BUTTON =================
      btn.onclick = () => {
        log("🟡 Click button → " + (!running ? "START" : "STOP"));

        window.api.send("toggle-server", !running);

        setTimeout(() => {
          if (!running) log("⚠️ No response from main process");
        }, 2000);
      };

      // ================= STATUS =================
      window.api.on("server-status", (_, state) => {
        log("📡 server-status: " + state);

        running = state;

        if (state) {
          statusText.innerText = "ONLINE";
          dot.className = "dot on";
          btn.innerText = "STOP";
        } else {
          statusText.innerText = "OFFLINE";
          dot.className = "dot off";
          btn.innerText = "START";
          qr.src = "";
          ipText.innerText = "Not running";
        }
      });

      // ================= SERVER INFO =================
      window.api.on("server-info", (_, data) => {
        log("🌐 server-info received");

        const url = `http://${data.ip}:${data.port}`;
        ipText.innerText = url;

        qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
      });

      // ================= LOG FROM MAIN =================
      window.api.on("server-log", (_, msg) => {
        log(msg);
      });

      // ================= ERROR =================
      window.onerror = function (msg, url, line) {
        log(`❌ JS Error: ${msg} (${line})`);
      };
    </script>
  </body>
</html>
